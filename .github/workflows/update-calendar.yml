name: Update calendar

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate ICS
        run: python -m pak_calendar.export --output dist/pakistan-men.ics

      - name: Commit updated feed
        run: |
          if git diff --quiet -- dist/pakistan-men.ics; then
            echo "Calendar feed unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist/pakistan-men.ics
            git commit -m "Update Pakistan cricket calendar"
            git push
          fi
